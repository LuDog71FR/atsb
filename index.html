<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Association de Tir Sportif de Branges</title>
  <link rel="stylesheet" href="/tailwind.css">
</head>
<body class="flex h-screen bg-gray-100 overflow-hidden">

  <!-- Overlay mobile (ferme la sidebar au clic en dehors) -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-20 hidden lg:hidden"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-30 w-64 flex-shrink-0 bg-gray-900 text-white flex flex-col h-screen overflow-y-auto -translate-x-full lg:translate-x-0 transition-transform duration-200">
    <div class="flex flex-col items-center px-4 py-6 border-b border-gray-700">
      <img src="/images/Logo.png" alt="Logo du club" class="w-28 h-28 object-contain mb-3">
      <span class="text-center text-sm font-semibold leading-snug text-gray-100">
        Association de Tir Sportif de Branges
      </span>
    </div>
    <nav id="nav-menu" class="flex-1 px-2 py-4"></nav>
    <div class="px-4 py-3 text-xs text-gray-500 border-t border-gray-700">© 2026 ATSB</div>
  </aside>

  <!-- Contenu principal -->
  <div class="flex flex-col flex-1 min-w-0">
    <!-- Header mobile -->
    <header class="lg:hidden flex items-center gap-3 bg-gray-900 text-white px-4 py-3 flex-shrink-0">
      <button id="menu-btn" aria-label="Ouvrir le menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="text-sm font-semibold">ATSB</span>
    </header>

    <main id="content-area" class="flex-1 overflow-y-auto bg-white">
      <div id="content" class="max-w-3xl mx-auto px-4 lg:px-8 py-6 lg:py-10"></div>
    </main>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
